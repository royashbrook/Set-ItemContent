name: PSGallery
on:
  release:
    types: [released]
jobs:
  psgallery_publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: validate manifest
        run: |
          Install-Module Add-PrefixForLogging -Force -Scope CurrentUser
          Test-ModuleManifest -Path 'Set-ItemContent/Set-ItemContent.psd1'
        shell: pwsh

      - name: publish
        run: |
          Publish-Module -Path 'Set-ItemContent' -NuGetApiKey ${{ secrets.PS_GALLERY_KEY }}
        shell: pwsh
